<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Appointment – Alodokter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f7fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 40px; width: 100%; max-width: 480px; }
    h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 8px; }
    .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 14px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #3b82f6; }
    .field { margin-bottom: 18px; }
    button { width: 100%; padding: 12px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s, opacity 0.2s; margin-top: 6px; }
    button:hover:not(:disabled) { background: #2563eb; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-top: 18px; display: none; }
    .alert.error { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; }
    .alert.success { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
    .detail-row { display: flex; justify-content: space-between; font-size: 13px; margin-top: 6px; }
    .detail-row span:first-child { color: #6b7280; }
    .detail-row span:last-child { font-weight: 600; color: #111827; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Book a Consultation</h1>
    <p class="subtitle">Fill in the details below to book your appointment</p>

    <form id="bookingForm" novalidate>
      <div class="field">
        <label for="doctor_id">Doctor ID</label>
        <input type="text" id="doctor_id" placeholder="e.g. D123" required />
      </div>
      <div class="field">
        <label for="patient_id">Patient ID</label>
        <input type="text" id="patient_id" placeholder="e.g. P456" required />
      </div>
      <div class="field">
        <label for="start_time">Start Time</label>
        <input type="datetime-local" id="start_time" required />
      </div>
      <div class="field">
        <label for="end_time">End Time</label>
        <input type="datetime-local" id="end_time" required />
      </div>

      <!-- Disabled during submission to prevent double submission -->
      <button type="submit" id="submitBtn">Book Appointment</button>
    </form>

    <div class="alert error" id="errorAlert"></div>
    <div class="alert success" id="successAlert"></div>
  </div>

  <script>
    const form = document.getElementById('bookingForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorAlert = document.getElementById('errorAlert');
    const successAlert = document.getElementById('successAlert');

    // Prevent double submission: track in-flight request
    let isSubmitting = false;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Guard: ignore if already submitting
      if (isSubmitting) return;

      // Clear previous alerts
      errorAlert.style.display = 'none';
      successAlert.style.display = 'none';

      const doctor_id  = document.getElementById('doctor_id').value.trim();
      const patient_id = document.getElementById('patient_id').value.trim();
      const start_time = document.getElementById('start_time').value;
      const end_time   = document.getElementById('end_time').value;

      // Client-side validation
      if (!doctor_id || !patient_id || !start_time || !end_time) {
        showError('Please fill in all fields.');
        return;
      }
      if (new Date(end_time) <= new Date(start_time)) {
        showError('End time must be after start time.');
        return;
      }

      // Disable button & set flag — prevents double submission
      isSubmitting = true;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Booking…';

      try {
        const response = await fetch('/api/v1/appointments', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({
            doctor_id,
            patient_id,
            start_time: new Date(start_time).toISOString(),
            end_time:   new Date(end_time).toISOString()
          })
        });

        const data = await response.json();

        if (response.ok) {
          showSuccess(data);
          form.reset();
        } else {
          showError(data.error || 'Booking failed. Please try again.');
        }
      } catch (err) {
        showError('Network error. Please check your connection and try again.');
      } finally {
        // Re-enable button after response
        isSubmitting = false;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Book Appointment';
      }
    });

    function showError(message) {
      errorAlert.textContent = message;
      errorAlert.style.display = 'block';
    }

    function showSuccess(data) {
      successAlert.innerHTML = `
        <strong>Appointment Confirmed!</strong>
        <div class="detail-row"><span>Appointment ID</span><span>#${data.id}</span></div>
        <div class="detail-row"><span>Doctor</span><span>${data.doctor_id}</span></div>
        <div class="detail-row"><span>Patient</span><span>${data.patient_id}</span></div>
        <div class="detail-row"><span>Start</span><span>${new Date(data.start_time).toLocaleString()}</span></div>
        <div class="detail-row"><span>End</span><span>${new Date(data.end_time).toLocaleString()}</span></div>
      `;
      successAlert.style.display = 'block';
    }
  </script>
</body>
</html>
