<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Book a consultation appointment with your doctor — Polymer 3.0 Web Components" />
  <title>Book Appointment – Polymer 3.0</title>
  <style>
    /* Global reset — styles inside components are encapsulated by Shadow DOM */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fa;
    }
  </style>
</head>
<body>

  <!--
    Polymer Custom Element: <booking-app>
    Semua UI di-render di dalam Shadow DOM komponen ini.
    Terdiri dari 3 custom elements:
      - <booking-app>    : Host / orkestrator utama
      - <booking-form>   : Form input dengan two-way binding
      - <alert-message>  : Pesan sukses/error
  -->
  <booking-app></booking-app>

  <!-- Bundled Polymer components (built via Rollup from frontend/src/) -->
  <script type="module" src="/js/booking-app.bundle.js"></script>

</body>
</html>
